name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_N8N_WEBHOOK_BASE: ${{ secrets.VITE_N8N_WEBHOOK_BASE }}

      - name: Clean wwwroot before deploy
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          USERNAME=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
          curl -X DELETE "https://app-atad2-prod.scm.azurewebsites.net/api/vfs/site/wwwroot/?recursive=true" \
            -u "$USERNAME:$PASSWORD" \
            --fail --show-error --silent -w "\nHTTP Status: %{http_code}\n" || true

      - uses: azure/webapps-deploy@v3
        with:
          app-name: app-atad2-prod
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: dist/
